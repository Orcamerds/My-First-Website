<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marco's Developer Journey</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th {
            background-color: #243b55;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        button {
            background-color: #243b55;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #141e30;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Marco – Future Web Developer</h1>

        <div class="card">
            <h2>About Me</h2>
            <p>I wake up at 4AM to build my future through code.</p>
        </div>

        <div class="card">
            <h2>My Skills</h2>
            <ul>
                <li>HTML</li>
                <li>CSS (Learning)</li>
                <li>JavaScript (Soon)</li>
                <li>Git & GitHub</li>
            </ul>
        </div>

        <div class="card">
            <h2>My 4AM Routine</h2>
            <table>
                <tr>
                    <th>Time</th>
                    <th>Activity</th>
                </tr>
                <tr>
                    <td>4:00 AM</td>
                    <td>Wake up and freshen up</td>
                </tr>
                <tr>
                    <td>4:30 AM</td>
                    <td>Coffee and Study</td>
                </tr>
                <tr>
                    <td>5:00 AM</td>
                    <td>Practice Coding</td>
                </tr>
            </table>
        </div>

        <div class="card">
            <h2>Start the Day</h2>
            <button onclick="alert('Let’s go Marco!')">Start Coding</button>
        </div>

    </div>

</body>
</html>
